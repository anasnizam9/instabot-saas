services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: instabot-saas-api:latest
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite+aiosqlite:///./data/instabot.db
      AUTO_CREATE_TABLES: "false"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      INSTAGRAM_WEBHOOK_VERIFY_TOKEN: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN:?INSTAGRAM_WEBHOOK_VERIFY_TOKEN is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-ID}
    volumes:
      - instabot_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  instabot_data:
