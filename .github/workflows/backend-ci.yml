name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies and lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.13.1 black==24.10.0 isort==5.13.2

      - name: Ruff check
        run: |
          ruff check \
            app/main.py \
            app/core/config.py \
            app/core/logging.py \
            app/api/routes/health.py \
            tests/test_phase5_ops.py

      - name: Black formatting check
        run: |
          black --check \
            app/main.py \
            app/core/config.py \
            app/core/logging.py \
            app/api/routes/health.py \
            tests/test_phase5_ops.py

      - name: Isort import order check
        run: |
          isort --check-only \
            app/main.py \
            app/core/config.py \
            app/core/logging.py \
            app/api/routes/health.py \
            tests/test_phase5_ops.py

  test-and-migrate:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit==2.9.0

      - name: Dependency vulnerability audit
        run: pip-audit --desc --progress-spinner off
